name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read Zig version
        id: zig-version
        run: echo "version=$(tr -d '[:space:]' < .zig-version)" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: Fetch Zig build dependencies
        run: |
          cd vendor/ghostty
          zig build --fetch

      - name: Build xcframework
        run: ./scripts/build-xcframework.sh

      - name: Package xcframework
        run: |
          cd Frameworks
          zip -r -y libghostty.xcframework.zip libghostty.xcframework/
          echo "CHECKSUM=$(swift package compute-checksum libghostty.xcframework.zip)" >> "$GITHUB_ENV"

      - name: Update Package.swift with release URL and checksum
        env:
          TAG: ${{ github.ref_name }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/libghostty.xcframework.zip"
          sed -i '' "s|^let xcframeworkURL = .*|let xcframeworkURL = \"${REPO_URL}\"|" Package.swift
          sed -i '' "s|^let xcframeworkChecksum = .*|let xcframeworkChecksum = \"${CHECKSUM}\"|" Package.swift
          echo "--- Updated Package.swift ---"
          head -10 Package.swift

      - name: Commit updated Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add Package.swift
          git commit -m "chore: update Package.swift for ${{ github.ref_name }} release"
          git push origin main
          # Move the tag to include the Package.swift update
          git tag -f "${{ github.ref_name }}"
          git push origin "${{ github.ref_name }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Frameworks/libghostty.xcframework.zip
          generate_release_notes: true
